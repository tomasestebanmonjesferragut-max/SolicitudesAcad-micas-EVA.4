<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Instituto John H. Watson - Agenda Semanal">
    <title>Agenda Semanal | Instituto John H. Watson</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1><i class="bi bi-mortarboard-fill me-2"></i>Instituto John H. Watson</h1>
        
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <i class="bi bi-house-door-fill me-2"></i>Inicio
                </a>
                <button class="navbar-toggler btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-1">
                        <li class="nav-item">
                            <a class="nav-link" href="solicitudes.html">
                                <i class="bi bi-inbox-fill me-1"></i>Trámites
                            </a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-tools me-1"></i>Servicios
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="materias.html"><i class="bi bi-journal-bookmark-fill me-2"></i>Asignaturas</a></li>
                                <li><a class="dropdown-item" href="profesores.html"><i class="bi bi-person-video3 me-2"></i>Docentes</a></li>
                                <li><a class="dropdown-item active" href="horarios.html"><i class="bi bi-calendar-week me-2"></i>Agenda Semanal</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="informacion.html">
                                <i class="bi bi-info-circle-fill me-1"></i>Directorio
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 layout fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3" style="border-color: var(--glass-border) !important;">
            <h2 class="fw-bold m-0" style="background: var(--primary-gradient); background-clip: text; -webkit-text-fill-color: transparent;">
                <i class="bi bi-calendar-week me-2 text-primary"></i>Agenda Semanal
            </h2>
            <div>
                <button id="btnMoverHorario" class="btn btn-warning btn-sm rounded-pill px-3 shadow-sm me-2 text-white">
                    <i class="bi bi-arrows-move me-2"></i>Editar Horario
                </button>
                <button class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm">
                    <i class="bi bi-printer me-2"></i>Exportar PDF
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table text-center align-middle">
                <thead>
                    <tr>
                        <th style="width: 10%;"><i class="bi bi-clock me-1"></i> Bloque</th>
                        <th style="width: 18%;">Lunes</th>
                        <th style="width: 18%;">Martes</th>
                        <th style="width: 18%;">Miércoles</th>
                        <th style="width: 18%;">Jueves</th>
                        <th style="width: 18%;">Viernes</th>
                    </tr>
                </thead>
                <tbody id="tablaHorarios">
                    <tr>
                        <td colspan="6" class="text-muted py-4">Cargando agenda semanal...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="mt-5 pt-5 border-top" style="border-color: var(--glass-border) !important;">
        <div class="container text-center pb-5">
            <p class="text-muted mb-0">
                <i class="bi bi-c-circle me-2"></i>2023 Instituto John H. Watson | Plataforma Educativa Segura
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/horarios.js"></script>

</html>
