<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual Avanzada | Instituto John H. Watson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1><i class="bi bi-mortarboard-fill me-2"></i>Instituto John H. Watson</h1>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><i class="bi bi-house-door-fill me-2"></i>Inicio</a>
                <button class="navbar-toggler btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-1">
                        <li class="nav-item"><a class="nav-link" href="solicitudes.html"><i class="bi bi-person-lines-fill me-1"></i>Admisión</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"><i class="bi bi-tools me-1"></i>Servicios</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="materias.html"><i class="bi bi-journal-bookmark-fill me-2"></i>Asignaturas</a></li>
                                <li><a class="dropdown-item" href="profesores.html"><i class="bi bi-person-video3 me-2"></i>Docentes</a></li>
                                <li><a class="dropdown-item" href="horarios.html"><i class="bi bi-calendar-week me-2"></i>Agenda Semanal</a></li>
                                <li><a class="dropdown-item active" href="aulaVirtual.html"><i class="bi bi-laptop me-2"></i>Aula Virtual</a></li>
                            </ul>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="solicitudesProfesores.html"><i class="bi bi-pc-display me-1"></i>Soporte</a></li>
                        <li class="nav-item"><a class="nav-link" href="informacion.html"><i class="bi bi-info-circle-fill me-1"></i>Directorio</a></li>
                        <li class="nav-item ms-lg-3 d-flex align-items-center">
                            <button id="btnTheme" class="btn btn-outline-primary btn-sm rounded-circle me-2"><i class="bi bi-sun-fill"></i></button>
                            <button id="btnAdmin" class="btn btn-outline-danger btn-sm rounded-pill"><i class="bi bi-lock-fill"></i></button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-3 fade-in"> <!-- Cambié my-5 a my-3 -->
        
        <!-- SECCIÓN 1: ANUNCIOS COMPACTOS -->
        <div class="row align-items-center mb-4 pb-2 border-bottom" style="border-color: var(--glass-border) !important;">
            <div class="col-md-6">
                <h4 class="fw-bold m-0"><i class="bi bi-laptop me-2 text-primary"></i>Aula Virtual</h4>
            </div>
            <div class="col-md-6 d-flex justify-content-md-end gap-2">
                <input type="text" id="buscadorAula" class="form-control form-control-sm" style="width: 180px;" placeholder="Buscar...">
                <button id="btnPublicarAnuncio" class="btn btn-sm btn-success rounded-pill" style="display: none;">
                    <i class="bi bi-plus-lg"></i> Publicar
                </button>
            </div>
        </div>

        <div class="row mb-4" id="contenedorAnuncios">
            <!-- Los anuncios se verán más pequeños ahora -->
        </div>

        <!-- SECCIÓN 2: ASIGNATURAS (Lo principal) -->
        <div class="mb-4">
            <h4 class="fw-bold mb-3"><i class="bi bi-journal-bookmark-fill me-2 text-primary"></i>Mis Asignaturas</h4>
            <div class="row g-3" id="contenedorMateriasAula"></div>
        </div>

        <!-- SECCIÓN 3: PROFESORES -->
        <div class="mt-4 border-top pt-3" style="border-color: var(--glass-border) !important;">
            <h4 class="fw-bold mb-3"><i class="bi bi-people-fill me-2 text-primary"></i>Directorio Docente</h4>
            <div class="row g-3" id="contenedorProfesoresContacto"></div>
        </div>
    </main>

    <footer class="mt-5 pt-5 border-top" style="border-color: var(--glass-border) !important;">
        <div class="container text-center pb-5">
            <p class="text-muted mb-0"><i class="bi bi-c-circle me-2"></i>2026 Instituto John H. Watson | Plataforma Educativa Segura</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/aulaVirtual.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
