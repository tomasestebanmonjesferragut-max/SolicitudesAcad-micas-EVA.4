<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Instituto John H. Watson - Asignaturas">
    <title>Asignaturas | Instituto John H. Watson</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- SweetAlert2 para modales -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1><i class="bi bi-mortarboard-fill me-2"></i>Instituto John H. Watson</h1>
        
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <i class="bi bi-house-door-fill me-2"></i>Inicio
                </a>
                <button class="navbar-toggler btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-1">
                        <li class="nav-item">
                            <a class="nav-link" href="solicitudes.html">
                                <i class="bi bi-inbox-fill me-1"></i>Trámites
                            </a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-tools me-1"></i>Servicios
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item active" href="materias.html"><i class="bi bi-journal-bookmark-fill me-2"></i>Asignaturas</a></li>
                                <li><a class="dropdown-item" href="profesores.html"><i class="bi bi-person-video3 me-2"></i>Docentes</a></li>
                                <li><a class="dropdown-item" href="horarios.html"><i class="bi bi-calendar-week me-2"></i>Agenda Semanal</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="informacion.html">
                                <i class="bi bi-info-circle-fill me-1"></i>Directorio
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 fade-in">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 border-bottom pb-3" style="border-color: var(--glass-border) !important;">
            <div>
                <h2 class="fw-bold m-0 mb-3 mb-md-0" style="background: var(--primary-gradient); background-clip: text; -webkit-text-fill-color: transparent;">
                    <i class="bi bi-journal-text me-2 text-primary"></i>Asignaturas Activas
                </h2>
                <span class="badge text-bg-primary fs-6 px-3 py-2 mt-2">Semestre Académico 2026-I</span>
            </div>
            
            <!-- Nuevos botones CRUD para Materias -->
            <div class="d-flex gap-2">
                <button id="btnAgregarMateria" class="btn btn-success rounded-pill shadow-sm">
                    <i class="bi bi-plus-circle me-2"></i>Añadir Asignatura
                </button>
                <button id="btnEditarMateria" class="btn btn-warning text-white rounded-pill shadow-sm">
                    <i class="bi bi-pencil-square me-2"></i>Modificar
                </button>
            </div>
        </div>

        <!-- Contenedor dinámico donde se inyectarán las tarjetas desde JS -->
        <div class="row g-4" id="contenedorMaterias">
            <div class="text-center py-5 text-muted w-100">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Cargando asignaturas...</p>
            </div>
        </div>
    </main>

    <footer class="mt-5 pt-5 border-top" style="border-color: var(--glass-border) !important;">
        <div class="container text-center pb-5">
            <p class="text-muted mb-0">
                <i class="bi bi-c-circle me-2"></i>2023 Instituto John H. Watson | Plataforma Educativa Segura
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script exclusivo para materias -->
    <script src="../js/materias.js"></script>
</body>
</html>
